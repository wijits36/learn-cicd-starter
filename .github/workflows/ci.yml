name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Run Go tests with coverage report (go test)
        run: go test ./... -cover

      - name: Run Go security checker (gosec)
        uses: securego/gosec@v2.26.1

  style:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Run Go style check (go fmt)
        run: test -z $(go fmt ./...)

      - name: Run Go linter (staticcheck)
        uses: dominikh/staticcheck-action@v1.4.1
